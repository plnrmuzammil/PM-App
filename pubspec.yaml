name: reale
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 4.0.0+4

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  argon_buttons_flutter: ^1.1.0
  flutter_signin_button: ^2.0.0
  google_fonts: ^5.1.0
  firebase_dynamic_links: ^5.3.5
  cupertino_icons: ^1.0.6
  pin_code_text_field: null
  google_sign_in: ^6.1.5
  flutter_facebook_auth: ^6.0.1
  country_code_picker: ^3.0.0
  geolocator: ^10.0.0
  dash_chat_2: ^0.0.18
  image_picker: ^1.0.4
  firebase_storage: ^11.2.6
  flutter_dropdown: ^1.0.1+hotfix.1
  location_permissions: ^4.0.1
  url_launcher: ^6.1.14
  rflutter_alert: ^2.0.7
  hexcolor: ^3.0.1
  flutter_ringtone_player: ^3.2.0
  firebase_messaging: ^14.6.7
  firebase_auth: ^4.9.0
  cloud_firestore: ^4.9.1
  enhanced_drop_down: ^0.3.0+0
  dropdown_search: null
  simple_database: ^2.0.1
  location: ^5.0.3
  carousel_images: ^1.1.2
  country_list_pick: ^1.0.1+6
  get: ^4.6.5
  fluttertoast: ^8.2.2
  hive: ^2.2.3
  group_radio_button: ^1.3.0
  intl: ^0.18.1
  flutter_spinkit: ^5.2.0




dev_dependencies:
  flutter_launcher_icons: ^0.11.0
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter_icons:
  image_path: "assets/images/pm.png"
  ios: true
  android: "ic_launcher"

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/pm.png
#     - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
